<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile — BlogSphere</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<header class="navbar" id="navbar"></header>

<div class="page-wrap">

  <!-- Profile header skeleton / actual -->
  <div id="profile-section">
    <div class="profile-banner skeleton"></div>
    <div class="profile-header">
      <div class="profile-pic skeleton" style="width:96px;height:96px;"></div>
      <div style="flex:1; padding-bottom:4px;">
        <div class="skeleton" style="height:22px;width:160px;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:14px;width:240px;"></div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('posts',this)">My Posts</button>
    <button class="tab" onclick="switchTab('edit',this)">Edit Profile</button>
  </div>

  <!-- Posts tab -->
  <div id="tab-posts">
    <div id="my-posts-grid" class="posts-grid"></div>
    <div id="my-empty" class="empty-state" style="display:none;">
      <div class="empty-icon">📝</div>
      <p>You haven't written anything yet.</p>
      <a href="add_blog.html" class="btn btn-primary" style="margin-top:16px;">Write your first post</a>
    </div>
  </div>

  <!-- Edit profile tab -->
  <div id="tab-edit" style="display:none; max-width:560px;">
    <div class="card">
      <div class="title-md" style="margin-bottom:20px;">Edit Profile</div>
      <div id="edit-banner" class="banner"></div>

      <div class="form-group" style="display:flex;align-items:center;gap:20px;">
        <div id="edit-avatar" class="profile-pic" style="width:72px;height:72px;font-size:26px;cursor:pointer;" onclick="document.getElementById('pic-input').click()">?</div>
        <div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:6px;">Click avatar to change photo</div>
          <input type="file" id="pic-input" accept="image/*" style="display:none;" onchange="previewPic(this)"/>
          <input type="url" id="pic-url" placeholder="…or paste image URL"/>
        </div>
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea id="edit-bio" placeholder="Tell the world who you are…"></textarea>
      </div>

      <button class="btn btn-primary" id="save-profile-btn" onclick="saveProfile()">Save Changes</button>
    </div>

    <!-- Change password -->
    <div class="card" style="margin-top:20px;">
      <div class="title-md" style="margin-bottom:20px;">Change Password</div>
      <div id="pwd-banner" class="banner"></div>
      <div class="form-group">
        <label>Current Password</label>
        <div class="input-wrap">
          <input type="password" id="cur-pwd" placeholder="••••••••"/>
          <button class="eye-btn" onclick="togglePwd('cur-pwd',this)">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrap">
          <input type="password" id="new-pwd" placeholder="Min 8 chars" oninput="checkStrength(this.value,'cp')"/>
          <button class="eye-btn" onclick="togglePwd('new-pwd',this)">👁</button>
        </div>
        <div class="strength-bar">
          <div class="strength-seg" id="cp1"></div>
          <div class="strength-seg" id="cp2"></div>
          <div class="strength-seg" id="cp3"></div>
          <div class="strength-seg" id="cp4"></div>
        </div>
        <div class="strength-label" id="cp-label"></div>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <div class="input-wrap">
          <input type="password" id="conf-pwd" placeholder="Repeat new password"/>
          <button class="eye-btn" onclick="togglePwd('conf-pwd',this)">👁</button>
        </div>
      </div>
      <button class="btn btn-secondary" id="change-pwd-btn" onclick="changePassword()">Update Password</button>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script>
requireAuth();
renderNavbar("profile");

let profileData = null;
let newPicFile  = null;

// ── Load profile ──────────────────────────────
async function loadProfile() {
  try {
    const res  = await apiFetch("/profile");
    const data = await res.json();
    if (!res.ok) { toast(data.error || "Failed to load profile.", "error"); return; }
    profileData = data;
    renderProfileHeader(data);
    renderMyPosts(data.posts || []);
    prefillEdit(data);
  } catch {
    toast("Could not load profile.", "error");
  }
}

function renderProfileHeader(data) {
  const u = data.user;
  const capitalize = ([first, ...rest]) => first.toUpperCase() + rest.join('').toLowerCase();
  const profileSec = document.getElementById("profile-section");
  const pic = u.profile_pic ? `<img class="profile-pic" src="${imgSrc(u.profile_pic)}" alt="avatar" style="object-fit:cover;"/>` :
    `<div class="profile-pic" style="display:flex;align-items:center;justify-content:center;">${initials(u.name || u.gmail)}</div>`;
  const name = u.name
  ? u.name.charAt(0).toUpperCase() + u.name.slice(1).toLowerCase()
  : u.gmail;
  profileSec.innerHTML = `
    <div class="profile-banner"></div>
    <div class="profile-header">
      ${pic}
      <div class="profile-info">
        <div class="profile-name">${name}</div>
        <div class="profile-bio">${u.bio || "No bio yet — tell the world who you are!"}</div>
        <div class="profile-stats">
          <div class="stat-item"><div class="stat-num">${(data.posts||[]).length}</div><div class="stat-lbl">Posts</div></div>
          <div class="stat-item"><div class="stat-num">${data.followers||0}</div><div class="stat-lbl">Followers</div></div>
          <div class="stat-item"><div class="stat-num">${data.following||0}</div><div class="stat-lbl">Following</div></div>
        </div>
      </div>
    </div>`;
}

function renderMyPosts(posts) {
  const grid  = document.getElementById("my-posts-grid");
  const empty = document.getElementById("my-empty");

  if (!posts.length) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = posts.map((p, i) => `
    <div class="post-card fade-in" style="animation-delay:${i * 0.05}s" onclick="openPost(${p.id})">
      ${p.image
        ? `<img class="post-img" src="${imgSrc(p.image)}" alt="${p.title}" onerror="this.parentElement.querySelector('.post-img-placeholder') && (this.style.display='none')">`
        : `<div class="post-img-placeholder">📝</div>`
      }
      <div class="post-body">
        <div class="post-meta">
          <div class="post-avatar">${initials(p.author_name || "U")}</div>
          <div>
            <div class="post-author">${p.author_name}</div>
          </div>
          <div class="post-date">${fmtDate(p.created_at)}</div>
        </div>
        <div class="post-title">${p.title}</div>

        
        <div class="post-excerpt">${truncate(p.content, 130)}</div>
      </div>
      <div class="post-footer">
        <button class="post-action ${p.is_liked ? 'liked':''}" onclick="event.stopPropagation();toggleLike(${p.id},this)">
          ${p.is_liked ? '❤️' : '🤍'} <span>${p.like_count || p.like || 0}</span>
        </button>
        <button class="post-action" onclick="event.stopPropagation();openPost(${p.id})">
          💬 <span>${p.comment_count || p.Comment || 0}</span>
        </button>
        ${p.login && !p.is_own ? `
          <button class="follow-btn ${p.is_following?'following':''}" id="follow-${p.user_id}"
            onclick="event.stopPropagation();toggleFollow(${p.user_id},this)">
            ${p.is_following ? '✓ Following' : '+ Follow'}
          </button>` : ""}
      </div>
    </div>`
  ).join("");
}
function openPost(id) {
  window.location.href = `add_blog.html?view=${id}`;
}

function prefillEdit(data) {
  const u = data.user;
  document.getElementById("edit-bio").value = u.bio || "";
  const av = document.getElementById("edit-avatar");
  if (u.profile_pic) {
    av.innerHTML = `<img src="${imgSrc(u.profile_pic)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
  } else {
    av.textContent = initials(u.name || u.gmail);
  }
}

// ── Tab switcher ──────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-posts").style.display = name === "posts" ? "block" : "none";
  document.getElementById("tab-edit").style.display  = name === "edit"  ? "block" : "none";
}

// ── Picture preview ───────────────────────────
function previewPic(input) {
  newPicFile = input.files[0];
  if (!newPicFile) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById("edit-avatar").innerHTML =
      `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
    document.getElementById("pic-url").value = "";
  };
  reader.readAsDataURL(newPicFile);
}

// ── Save profile (bio + pic) ──────────────────
async function saveProfile() {
  const picUrl = document.getElementById("pic-url").value.trim();
  const bio    = document.getElementById("edit-bio").value.trim();
  const btn    = document.getElementById("save-profile-btn");
  setLoading(btn, true);

  try {
    let body, headers = {};
    if (newPicFile) {
      body = new FormData();
      body.append("bio", bio);
      body.append("profile_pic", newPicFile);
    } else {
      headers["Content-Type"] = "application/json";
      body = JSON.stringify({ bio, profile_pic_url: picUrl || undefined });
    }

    const res = await apiFetch("/update_profile", {
      method: "PUT",
      headers,
      body,
    });
    const data = await res.json();
    setLoading(btn, false, "Save Changes");
    if (res.ok) {
      toast("Profile updated!", "success");
      loadProfile();
    } else {
      showBanner("edit-banner", data.error || "Update failed.");
    }
  } catch {
    setLoading(btn, false, "Save Changes");
    showBanner("edit-banner", "Network error.");
  }
}

// ── Change password ───────────────────────────
async function changePassword() {
  const current  = document.getElementById("cur-pwd").value;
  const password = document.getElementById("new-pwd").value;
  const confirm  = document.getElementById("conf-pwd").value;

  if (!current || !password || !confirm)
    return showBanner("pwd-banner", "Please fill in all password fields.");
  if (password !== confirm)
    return showBanner("pwd-banner", "New passwords do not match.");

  const btn = document.getElementById("change-pwd-btn");
  setLoading(btn, true);
  try {
    const res  = await apiFetch("/change_password", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ current_password: current, password, confirm }),
    });
    const data = await res.json();
    setLoading(btn, false, "Update Password");
    if (res.ok) {
      toast("Password changed!", "success");
      ["cur-pwd","new-pwd","conf-pwd"].forEach(id => document.getElementById(id).value = "");
      clearBanner("pwd-banner");
    } else {
      showBanner("pwd-banner", data.error || "Failed to change password.");
    }
  } catch {
    setLoading(btn, false, "Update Password");
    showBanner("pwd-banner", "Network error.");
  }
}
function editPost(id) {
  window.location.href = `add_blog.html?edit=${id}`;
}
// ── Delete post ───────────────────────────────
async function deletePost(id, btn) {
  if (!confirm("Delete this post?")) return;

  try {
    const res = await apiFetch(`/delete_post/${id}`, {
      method: "DELETE"
    });

    const data = await res.json();

    if (res.ok) {
      btn.closest(".post-card").remove();   // ✅ remove UI
      toast(data.msg || "Post deleted", "success");
    } else {
      toast(data.error || "Delete failed", "error");
    }

  } catch (err) {
    console.error(err);
    toast("Server error", "error");
  }
}

loadProfile();
</script>
</body>
</html>
